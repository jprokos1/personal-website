<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal — Jonathan Prokos</title>
    <link rel="icon" href="../img/favicon.png" type="image/x-icon" />
    <link href="../css/main.css" rel="stylesheet" type="text/css" />
    <script src="../js/polyfills.js"></script>
    <script src="../js/main.js"></script>
    <style>
        body {
            overflow: hidden;
        }
        #sidenav {
            display: none;
        }
        #container {
            margin-left: 1em;
            margin-right: 1em;
        }
    </style>
</head>

<body>
    <div id="sidenav">
        <button id="sidenavBtn">&#9776;</button>
        <img id="profilePic" src="../img/profile.jpg" height="auto" width="100%">
    </div>
    <div id="container">
        <div id="output"></div>
        <div id="input-line" class="input-line">
            <div id="prompt" class="prompt-color"></div>&nbsp;
            <div>
                <input type="text" id="cmdline" autocomplete="off" autocorrect="off"
                    autocapitalize="off" spellcheck="false" autofocus />
            </div>
        </div>
    </div>
</body>

</html>
